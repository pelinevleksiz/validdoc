version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: validdoc-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: validdoc
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: